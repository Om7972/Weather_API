<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weather App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        color: #1f2937;
      }
      .card {
        max-width: 520px;
        padding: 24px;
        border-radius: 16px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }
      code {
        background: #e2e8f0;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Weather App</h2>
      <p>
        The app has been moved to the clean structure under <code>public/</code> and
        is served by the Node backend.
      </p>
      <p>Run <code>npm install</code> then <code>npm start</code> and open:</p>
      <p><code>http://localhost:3000</code></p>
    </div>
  </body>
</html>
